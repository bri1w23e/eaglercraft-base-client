name: Compile Meteor Client

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Compile EPK (Assets)
      run: java -jar "desktopRuntime/CompileEPK.jar" "desktopRuntime/resources" "javascript/assets.epk"
    
    - name: Generate JavaScript
      run: ./gradlew generateJavascript
    
    - name: Upload compiled artifacts
      uses: actions/upload-artifact@v3
      with:
        name: compiled-client
        path: javascript/
        retention-days: 30
    
    - name: Commit compiled files (if changed)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add javascript/ || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-compile Meteor Client" && git push) || true
